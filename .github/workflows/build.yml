name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Expo CLI
        run: npm install -g eas-cli
      - name: Install dependencies
        run: npm install
      - name: Build APK
        run: npx expo export
        
